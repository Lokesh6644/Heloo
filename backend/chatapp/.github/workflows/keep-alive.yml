name: Keep Render App Alive

on:
  schedule:
    # Every 10 minutes (Render sleeps after 15 mins)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]  # Run once after each push

jobs:
  ping:
    name: Ping ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [production]  # Add staging if you have it

    steps:
      - name: Set environment URL
        id: url
        run: |
          if [ "${{ matrix.environment }}" == "production" ]; then
            echo "url=https://heloo-backend.onrender.com" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.environment }}" == "staging" ]; then
            echo "url=https://heloo-backend.onrender.com" >> $GITHUB_OUTPUT
          fi

      - name: Ping health endpoint
        id: ping
        continue-on-error: true
        run: |
          response=$(curl -w "\n%{http_code}" \
            -X GET "${{ steps.url.outputs.url }}/api/health" \
            -H "User-Agent: GitHub-Actions-Keep-Alive" \
            --max-time 30 \
            --silent)
          
          # Extract status code (last line)
          status_code=$(echo "$response" | tail -n1)
          # Extract response body (everything except last line)
          body=$(echo "$response" | sed '$d')
          
          echo "status=$status_code" >> $GITHUB_OUTPUT
          echo "body=$body" >> $GITHUB_OUTPUT
          
          echo "Status: $status_code"
          echo "Response: $body"

      - name: Check ping result
        if: steps.ping.outputs.status != '200'
        run: |
          echo "⚠️ Health check failed with status: ${{ steps.ping.outputs.status }}"
          echo "Response: ${{ steps.ping.outputs.body }}"
          exit 1

      - name: Log success
        if: success()
        run: |
          echo "✅ Successfully pinged ${{ steps.url.outputs.url }} at $(date)"
          echo "App is awake and responding!"